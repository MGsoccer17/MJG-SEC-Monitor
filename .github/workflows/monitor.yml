name: MJG SEC Monitor Automation

on:
  schedule:
    - cron: '0 * * * *'  # This tells it to run every hour
  workflow_dispatch:      # This adds a "Run Now" button for you

permissions:
  contents: write         # Allows the robot to save the new data back to your folder

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install requests

      - name: Run SEC Monitor
        run: python monitor_sec.py

      - name: Save Results
        run: |
          git config --global user.name "MJG-Monitor-Bot"
          git config --global user.email "actions@github.com"
          git add sec-monitor/filings_log.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Log with New Filings" && git push)
