name: MJG SEC Monitor Automation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    name: Run SEC Monitor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install requests

      - name: Find and Run SEC Monitor
        run: |
          # This command searches for the file and runs it wherever it is!
          FILE_PATH=$(find . -name "monitor_sec.py" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "ERROR: monitor_sec.py not found!"
            exit 1
          else
            echo "Found script at: $FILE_PATH"
            python "$FILE_PATH"
          fi

      - name: Save Results
        run: |
          git config --global user.name "MJG-Monitor-Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Log" && git push)
