name: MJG SEC Monitor Automation

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour on the hour
  workflow_dispatch:      # Allows you to click the "Run" button manually

permissions:
  contents: write         # Allows the robot to save data and the dashboard

jobs:
  run-monitor:
    name: Run SEC Monitor and Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install requests

      - name: Run Monitor and Generate Dashboard
        run: |
          # 1. Enter the subfolder where your code lives
          cd MJG-SEC-Monitor
          
          # 2. Run the monitor to collect new SEC data
          echo "Running Monitor..."
          python monitor_sec.py
          
          # 3. Run the dashboard script to create the webpage
          echo "Generating Dashboard..."
          python sec-monitor/generate_dashboard.py
          
          # 4. Move the final dashboard (index.html) to the root folder
          # This makes it easier for GitHub Pages to find it.
          mv index.html ../index.html

      - name: Save Results to GitHub
        run: |
          git config --global user.name "MJG-Monitor-Bot"
          git config --global user.email "actions@github.com"
          
          # Add everything (The updated Log AND the new index.html)
          git add .
          
          # Save the changes if there is new data
          git diff --quiet && git diff --staged --quiet || (git commit -m "SEC Update: New Filings and Dashboard Refresh" && git push)
