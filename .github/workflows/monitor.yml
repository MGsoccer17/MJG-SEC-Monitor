name: MJG SEC Monitor Automation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    name: Run SEC Monitor and Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install requests

      - name: Find, Run, and Generate Dashboard
        run: |
          # 1. Find where the 'monitor_sec.py' file is hiding
          SCRIPT_PATH=$(find . -name "monitor_sec.py" -print -quit)
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          
          echo "I found your code in folder: $SCRIPT_DIR"
          
          # 2. Go into that folder
          cd "$SCRIPT_DIR"
          
          # 3. Run the monitor
          echo "Running Monitor..."
          python monitor_sec.py
          
          # 4. Run the dashboard (it's in the sec-monitor subfolder)
          echo "Generating Dashboard..."
          python sec-monitor/generate_dashboard.py
          
          # 5. Move the dashboard (index.html) to the root for GitHub Pages
          # We check if we are already in the root or a subfolder first
          if [ "$SCRIPT_DIR" != "." ]; then
            cp index.html ../index.html
          fi

      - name: Save Results to GitHub
        run: |
          git config --global user.name "MJG-Monitor-Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "SEC Update: New Filings and Dashboard Refresh" && git push)
